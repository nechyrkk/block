<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Progress</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <main class="app">
        <header class="app__header">
            <h1 class="app__title">Progress</h1>
        </header>

        <section class="app__stage">
            <div class="progress" data-progress></div>
        </section>

        <section class="app__controls controls">
            <label class="controls__row controls__row--input" for="value-input">
                <input
                    id="value-input"
                    class="controls__input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="3"
                    value="0"
                    autocomplete="off">
                <span class="controls__label">Value</span>
            </label>

            <label class="controls__row" for="animate-toggle">
                <span class="toggle">
                    <input id="animate-toggle" class="toggle__input" type="checkbox">
                    <span class="toggle__track">
                        <span class="toggle__thumb"></span>
                    </span>
                </span>
                <span class="controls__label">Animate</span>
            </label>

            <label class="controls__row" for="hide-toggle">
                <span class="toggle">
                    <input id="hide-toggle" class="toggle__input" type="checkbox">
                    <span class="toggle__track">
                        <span class="toggle__thumb"></span>
                    </span>
                </span>
                <span class="controls__label">Hide</span>
            </label>
        </section>
    </main>

    <script src="js/progress.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
